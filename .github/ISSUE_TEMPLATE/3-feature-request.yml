name: Feature Request
description: Propose an improvement to Meal Planner.
labels:
  - enhancement
body:
  - type: markdown
    attributes:
      value: |
        Before submitting a feature request, please search existing issues first. If a similar request already exists, add a reaction or comment there.

        Good feature requests describe the cooking or planning job, not just the UI control.

  - type: textarea
    id: problem
    attributes:
      label: What problem are you trying to solve?
      description: Describe the real meal planning, shopping, recipe, or Obsidian workflow that is painful today.
      placeholder: "When I plan dinners for four people, I need to ..."
    validations:
      required: true

  - type: textarea
    id: current-workaround
    attributes:
      label: How do you handle it today?
      description: Tell us what manual steps, other plugins, or notes you currently use.

  - type: textarea
    id: proposal
    attributes:
      label: What would you like Meal Planner to do?
      description: Be specific about the behavior, input, and output.
    validations:
      required: true

  - type: dropdown
    id: area
    attributes:
      label: Which part of the plugin would this affect?
      multiple: true
      options:
        - Calendar planning
        - Recipe search/details
        - Ingredient metadata
        - Shopping list
        - Nutrition
        - Import/export
        - Settings
        - Updates/releases
        - Documentation
        - Other
    validations:
      required: true

  - type: textarea
    id: examples
    attributes:
      label: Example data or output
      description: Optional, but useful. Paste sample recipe frontmatter, ingredient metadata, meal plan text, or expected shopping list output.
      render: text

  - type: textarea
    id: notes
    attributes:
      label: Additional information
      description: Anything else that would help evaluate the request.
